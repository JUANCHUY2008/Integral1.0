<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Integrales Directas - Prepa</title>
    <style>
        /* Fondo Animado con gradiente en movimiento */
        @keyframes fondoAnimado {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* SE CAMBIÓ A TONOS AZULES */
            background: linear-gradient(-45deg, #0044ff, #0022aa, #3366ff, #001155);
            background-size: 400% 400%;
            animation: fondoAnimado 12s ease infinite;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            /* SE CAMBIÓ A UN AZUL SEMITRANSPARENTE */
            background-color: rgba(42, 110, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 90%;
            border: 3px solid #000000;
        }

        /* Botones Verdes */
        button {
            /* SE CAMBIÓ A VERDE */
            background-color: #00cc44;
            color: #000000;
            border: 3px solid #000000;
            padding: 14px 28px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
            box-shadow: 0 4px 0 #000000;
        }

        button:hover {
            /* SE CAMBIÓ A UN VERDE MÁS CLARO EN HOVER */
            background-color: #1fe060;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #000000;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #000000;
        }

        /* Pantallas */
        .screen {
            display: none;
        }

        .active {
            display: block;
        }

        /* Pantalla de Inicio */
        #inicio h1 {
            font-size: 3.5rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 2px -2px 0px #fff, -2px 2px 0px #fff;
        }

        /* Pantalla de Calculadora */
        select, input {
            padding: 10px;
            font-size: 1.1rem;
            border: 2px solid #000000;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            background-color: #ffffff;
            color: #000000;
        }

        .opcion-bloque {
            background-color: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px dashed #000000;
        }

        .simbolo-integral {
            font-size: 2rem;
            vertical-align: middle;
            font-family: 'Times New Roman', Times, serif;
        }

        /* Contenedor de Resultados y Procedimientos */
        #resultado-box {
            margin-top: 25px;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #000000;
            text-align: left;
            display: none;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        #resultado-box h3 {
            margin-top: 0;
            border-bottom: 2px dashed #000000;
            padding-bottom: 8px;
        }

        .paso {
            margin-bottom: 12px;
            font-size: 1.1rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="inicio" class="screen active">
            <h1>INTEGRAL DIRECTA</h1>
            <button id="btn-comenzar">Calcular ya</button>
        </div>

        <div id="calculadora" class="screen">
            <h2>Formulario de Integrales Inmediatas</h2>
            <p>Selecciona un tipo de integral directa para resolver:</p>
            
            <div class="opcion-bloque">
                <label for="tipo-integral"><b>Tipo: </b></label>
                <select id="tipo-integral">
                    <option value="potencia">∫ a·xⁿ dx (Potencia)</option>
                    <option value="seno">∫ a·sin(kx) dx (Seno)</option>
                    <option value="coseno">∫ a·cos(kx) dx (Coseno)</option>
                    <option value="exponencial">∫ a·eᵏⁿ dx (Exponencial)</option>
                </select>
            </div>

            <div id="inputs-dinamicos" class="opcion-bloque">
                <span class="simbolo-integral">∫</span>
                <input type="number" id="val-a" value="6" style="width: 55px;" placeholder="a">
                <span>x</span>
                <input type="number" id="val-n" value="2" style="width: 55px;" placeholder="n">
                <span> dx</span>
            </div>

            <button id="btn-calcular">Calcular Integral</button>
            <!-- SE CAMBIÓ EL COLOR DE VOLVER A UN VERDE OSCURO -->
            <button id="btn-volver" style="background-color: #009933;">Volver</button>

            <div id="resultado-box">
                <h3>Procedimiento paso a paso:</h3>
                <div id="pasos-integral"></div>
            </div>
        </div>

    </div>

    <script>
        // Navegación
        const pantallaInicio = document.getElementById('inicio');
        const pantallaCalculadora = document.getElementById('calculadora');
        const btnComenzar = document.getElementById('btn-comenzar');
        const btnVolver = document.getElementById('btn-volver');
        const btnCalcular = document.getElementById('btn-calcular');
        const tipoIntegral = document.getElementById('tipo-integral');
        const inputsDinamicos = document.getElementById('inputs-dinamicos');
        const resultadoBox = document.getElementById('resultado-box');
        const pasosDiv = document.getElementById('pasos-integral');

        btnComenzar.addEventListener('click', () => {
            pantallaInicio.classList.remove('active');
            pantallaCalculadora.classList.add('active');
        });

        btnVolver.addEventListener('click', () => {
            pantallaCalculadora.classList.remove('active');
            pantallaInicio.classList.add('active');
            resultadoBox.style.display = 'none';
        });

        // Cambiar inputs según la fórmula
        tipoIntegral.addEventListener('change', () => {
            resultadoBox.style.display = 'none';
            const opcion = tipoIntegral.value;
            
            if (opcion === 'potencia') {
                inputsDinamicos.innerHTML = `
                    <span class="simbolo-integral">∫</span>
                    <input type="number" id="val-a" value="6" style="width: 55px;">
                    <span>x</span>
                    <input type="number" id="val-n" value="2" style="width: 55px;">
                    <span> dx</span>
                `;
            } else if (opcion === 'seno' || opcion === 'coseno') {
                inputsDinamicos.innerHTML = `
                    <span class="simbolo-integral">∫</span>
                    <input type="number" id="val-a" value="4" style="width: 55px;" placeholder="a">
                    <span> · ${opcion}(</span>
                    <input type="number" id="val-k" value="2" style="width: 55px;" placeholder="k">
                    <span>x) dx</span>
                `;
            } else if (opcion === 'exponencial') {
                inputsDinamicos.innerHTML = `
                    <span class="simbolo-integral">∫</span>
                    <input type="number" id="val-a" value="3" style="width: 55px;" placeholder="a">
                    <span> · e<sup><input type="number" id="val-k" value="5" style="width: 45px;">x</sup> dx</span>
                `;
            }
        });

        // Función para simplificar fracciones
        function simplificarFraccion(numerador, denominador) {
            if (denominador === 0) return "Indefinido";
            const mcd = (x, y) => y === 0 ? x : mcd(y, x % y);
            const divisor = Math.abs(mcd(numerador, denominador));
            let num = numerador / divisor;
            let den = denominador / divisor;
            
            if (den === 1) return `${num}`;
            if (den === -1) return `${-num}`;
            if (den < 0) { num = -num; den = -den; }
            return `(${num}/${den})`;
        }

        // Motor de cálculo analítico de integrales
        btnCalcular.addEventListener('click', () => {
            const opcion = tipoIntegral.value;
            let htmlPasos = "";
            let resultadoFinal = "";

            const a = parseFloat(document.getElementById('val-a').value || 1);

            if (opcion === 'potencia') {
                const n = parseFloat(document.getElementById('val-n').value || 1);
                
                if (n === -1) {
                    htmlPasos = `
                        <div class="paso"><b>Caso Especial (n = -1):</b> La fórmula clásica no aplica porque dividiríamos entre cero.</div>
                        <div class="paso"><b>Fórmula directa:</b> ∫ (a / x) dx = a · ln|x| + C</div>
                        <div class="paso"><b>Paso único:</b> Sacamos la constante <b>${a}</b> y multiplicamos por el logaritmo natural de x.</div>
                    `;
                    resultadoFinal = `${a} · ln|x| + C`;
                } else {
                    const nuevoExponente = n + 1;
                    const fraccionSimplificada = simplificarFraccion(a, nuevoExponente);
                    
                    htmlPasos = `
                        <div class="paso"><b>Fórmula directa:</b> ∫ a·xⁿ dx = a · [ xⁿ⁺¹ / (n + 1) ] + C</div>
                        <div class="paso"><b>Paso 1:</b> Sumar 1 al exponente original &rarr; ${n} + 1 = ${nuevoExponente}</div>
                        <div class="paso"><b>Paso 2:</b> Dividir el término por el nuevo exponente &rarr; (${a} / ${nuevoExponente}) · x<sup>${nuevoExponente}</sup></div>
                    `;
                    resultadoFinal = `${fraccionSimplificada}x<sup>${nuevoExponente}</sup> + C`;
                }

            } else if (opcion === 'seno') {
                const k = parseFloat(document.getElementById('val-k').value || 1);
                const fraccion = simplificarFraccion(-a, k);
                
                htmlPasos = `
                    <div class="paso"><b>Fórmula directa:</b> ∫ a · sin(kx) dx = - (a / k) · cos(kx) + C</div>
                    <div class="paso"><b>Paso 1 (Completar diferencial):</b> El argumento interno es <b>${k}x</b>. Su derivada es <b>${k}</b>, por lo que sacamos el inverso multiplicativo (1 / ${k}) de la integral.</div>
                    <div class="paso"><b>Paso 2 (Integración):</b> La integral del seno es el <b>menos coseno</b>. Multiplicamos signos y coeficientes: &rarr; -(${a} / ${k})</div>
                `;
                resultadoFinal = `${fraccion} · cos(${k}x) + C`;

            } else if (opcion === 'coseno') {
                const k = parseFloat(document.getElementById('val-k').value || 1);
                const fraccion = simplificarFraccion(a, k);
                
                htmlPasos = `
                    <div class="paso"><b>Fórmula directa:</b> ∫ a · cos(kx) dx = (a / k) · sin(kx) + C</div>
                    <div class="paso"><b>Paso 1 (Completar diferencial):</b> Al igual que antes, dividimos la constante exterior entre el número del argumento &rarr; (${a} / ${k})</div>
                    <div class="paso"><b>Paso 2:</b> La integral directa del coseno es el <b>seno positivo</b>, manteniendo el mismo ángulo interno.</div>
                `;
                resultadoFinal = `${fraccion} · sin(${k}x) + C`;

            } else if (opcion === 'exponencial') {
                const k = parseFloat(document.getElementById('val-k').value || 1);
                const fraccion = simplificarFraccion(a, k);
                
                htmlPasos = `
                    <div class="paso"><b>Fórmula directa:</b> ∫ a · eᵏⁿ dx = (a / k) · eᵏⁿ + C</div>
                    <div class="paso"><b>Paso 1:</b> La función exponencial $e^u$ se queda exactamente igual en las integrales inmediatas.</div>
                    <div class="paso"><b>Paso 2:</b> Por sustitución/completar diferencial, dividimos la constante por el valor numérico que acompaña a la x &rarr; (${a} / ${k})</div>
                `;
                resultadoFinal = `${fraccion} · e<sup>${k}x</sup> + C`;
            }

            // Inyectar el resultado final (resaltado en naranja para contraste)
            htmlPasos += `
                <div class="paso" style="font-size: 1.3rem; margin-top: 15px; border-top: 2px dashed #000000; padding-top: 10px;">
                    <b>Resultado: </b> <span style="color: #ff6600; font-weight: bold;">${resultadoFinal}</span>
                </div>
            `;

            pasosDiv.innerHTML = htmlPasos;
            resultadoBox.style.display = 'block';
        });
    </script>
</body>
</html>
